<svg viewBox="0 0 500 260" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <rect x="0" y="0" width="500" height="260" fill="#f7fafc"/>

  <text x="250" y="26" text-anchor="middle" fill="#1a365d" font-size="15" font-weight="700">
    ATP producidos por molécula de glucosa
  </text>

  <!-- Eje base -->
  <line x1="60" y1="220" x2="460" y2="220" stroke="#a0aec0" stroke-width="2"/>

  <!-- Barra aerobica -->
  <rect x="130" y="50" width="80" height="170" rx="6" fill="#2b6cb0"/>
  <text x="170" y="45" text-anchor="middle" fill="#1a365d" font-size="14" font-weight="700">36-38 ATP</text>
  <text x="170" y="240" text-anchor="middle" fill="#2d3748" font-size="12" font-weight="600">Aeróbica</text>
  <text x="170" y="255" text-anchor="middle" fill="#718096" font-size="10">(con O₂)</text>

  <!-- Barra anaerobica -->
  <rect x="300" y="205" width="80" height="15" rx="6" fill="#c05621"/>
  <text x="340" y="200" text-anchor="middle" fill="#9c4221" font-size="14" font-weight="700">2 ATP</text>
  <text x="340" y="240" text-anchor="middle" fill="#2d3748" font-size="12" font-weight="600">Anaeróbica</text>
  <text x="340" y="255" text-anchor="middle" fill="#718096" font-size="10">(fermentación, sin O₂)</text>
</svg>

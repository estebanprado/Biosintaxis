<svg viewBox="0 0 500 260" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <rect x="0" y="0" width="500" height="260" fill="#f7fafc"/>

  <!-- Glucosa -->
  <rect x="20" y="105" width="90" height="50" rx="8" fill="#1a365d"/>
  <text x="65" y="135" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Glucosa</text>

  <!-- Arrow to Piruvato -->
  <line x1="110" y1="130" x2="175" y2="130" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="140" y="118" text-anchor="middle" fill="#718096" font-size="10">Glucólisis</text>

  <!-- Piruvato -->
  <rect x="180" y="105" width="100" height="50" rx="8" fill="#2b6cb0"/>
  <text x="230" y="135" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Piruvato</text>

  <!-- Two arrows diverging -->
  <line x1="280" y1="120" x2="360" y2="60" stroke="#319795" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="140" x2="360" y2="200" stroke="#c05621" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Lactato box -->
  <rect x="365" y="35" width="115" height="50" rx="8" fill="#319795"/>
  <text x="422" y="57" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Ácido láctico</text>
  <text x="422" y="73" text-anchor="middle" fill="#e6fffa" font-size="10">(Fermentación láctica)</text>

  <!-- Etanol box -->
  <rect x="365" y="175" width="115" height="50" rx="8" fill="#c05621"/>
  <text x="422" y="197" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Etanol + CO₂</text>
  <text x="422" y="213" text-anchor="middle" fill="#fffaf0" font-size="10">(Fermentación alcohólica)</text>

  <text x="230" y="185" text-anchor="middle" fill="#718096" font-size="10">2 ATP netos (sin O₂)</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#4a5568"/>
    </marker>
  </defs>
</svg>
